# 训练配置文件
model:
  name: "Qwen/Qwen2-0.5B-Instruct"
  max_length: 512

training:
  output_dir: "./results"
  num_train_epochs: 10
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 2
  learning_rate: 5e-4
  warmup_steps: 5
  logging_steps: 5
  save_steps: 20
  save_total_limit: 2
  fp16: true
  optim: "adamw_torch"
  remove_unused_columns: false

lora:
  r: 8
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj" 
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

generation:
  max_new_tokens: 200
  temperature: 0.7
  top_p: 0.9
  do_sample: true